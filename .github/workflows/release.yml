name: Release

# Triggered by pushing a semver tag, e.g.
#   make release V=v0.1.0      (or: git tag v0.1.0 && git push origin v0.1.0)
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: service-kit-x
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: assanoff/servicekit
          path: go-web-sdk

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Test
        working-directory: service-kit-x
        run: go test -race -short ./...

      - name: Build versioned binaries
        working-directory: service-kit-x
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          ldflags="-s -w -X github.com/assanoff/service-kit-x/internal/cmd.version=${VERSION}"
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${target%/*}"; arch="${target#*/}"
            out="dist/service-kit-x_${VERSION}_${os}_${arch}"
            echo ">> building $out"
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 \
              go build -trimpath -ldflags "$ldflags" -o "$out" .
          done
          ( cd dist && sha256sum service-kit-x_* > checksums.txt )

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: service-kit-x/dist/*
