edition = "2023";

package widget.v1;

import "google/api/annotations.proto";
import "google/protobuf/go_features.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/assanoff/skit-x/gen/widget/v1;widgetv1";

// HYBRID Go API: the opaque accessors/builders (Get*/Set*/Type_builder) used by
// the gRPC handler PLUS the exported struct fields that protoc-gen-grpc-gateway
// requires for path parameters (it assigns protoReq.Id directly). Pure
// API_OPAQUE hides those fields and breaks the gateway; HYBRID is the bridge for
// an entity exposed over BOTH gRPC and the gateway. gRPC-only entities can stay
// API_OPAQUE.
option features.(pb.go).api_level = API_HYBRID;

// Keep proto3-like semantics by default: singular fields have no presence.
// Fields that need presence opt in with [features.field_presence = EXPLICIT].
option features.field_presence = IMPLICIT;

// Widget mirrors the domain entity over the wire.
message Widget {
  string id = 1;
  string name = 2;
  string description = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
}

message CreateWidgetRequest {
  string name = 1;
  string description = 2;
}
message CreateWidgetResponse {
  Widget widget = 1;
}

message GetWidgetRequest {
  string id = 1;
}
message GetWidgetResponse {
  Widget widget = 1;
}

message ListWidgetsRequest {
  // 1-based page number and page size; both default server-side when unset (0).
  // Over the gateway these map to ?page= and ?page_size= query parameters.
  int32 page = 1;
  int32 page_size = 2;
}
message ListWidgetsResponse {
  repeated Widget widgets = 1;
}

message UpdateWidgetRequest {
  string id = 1;
  // Explicit presence so the server can distinguish "unset" from "empty"
  // (partial update), the editions equivalent of proto3 `optional`.
  string name = 2 [features.field_presence = EXPLICIT];
  string description = 3 [features.field_presence = EXPLICIT];
}
message UpdateWidgetResponse {
  Widget widget = 1;
}

message DeleteWidgetRequest {
  string id = 1;
}
message DeleteWidgetResponse {}

// WidgetService is the gRPC counterpart of the REST widget API. The
// google.api.http annotations let protoc-gen-grpc-gateway generate a JSON/HTTP
// proxy (served under /v1/widgets on the gateway's own port) — independent of
// the hand-written REST API.
service WidgetService {
  rpc CreateWidget(CreateWidgetRequest) returns (CreateWidgetResponse) {
    option (google.api.http) = {
      post: "/v1/widgets"
      body: "*"
    };
  }
  rpc GetWidget(GetWidgetRequest) returns (GetWidgetResponse) {
    option (google.api.http) = {get: "/v1/widgets/{id}"};
  }
  rpc ListWidgets(ListWidgetsRequest) returns (ListWidgetsResponse) {
    option (google.api.http) = {get: "/v1/widgets"};
  }
  rpc UpdateWidget(UpdateWidgetRequest) returns (UpdateWidgetResponse) {
    option (google.api.http) = {
      patch: "/v1/widgets/{id}"
      body: "*"
    };
  }
  rpc DeleteWidget(DeleteWidgetRequest) returns (DeleteWidgetResponse) {
    option (google.api.http) = {delete: "/v1/widgets/{id}"};
  }
}
